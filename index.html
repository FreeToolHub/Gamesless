<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tap Escape: Brain Reflex Challenge</title>
<style>
    :root {
        --primary: #0ff;
        --danger: #ff0055;
        --fake: #a020f0;
        --bg: #0b0b1a;
    }
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: #fff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
        touch-action: none;
    }
    #gameCanvas {
        display: block;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
    }
    .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
    }
    .score-board {
        margin-top: 30px;
        font-size: 28px;
        font-weight: bold;
        text-align: center;
        text-shadow: 0 0 10px var(--primary);
    }
    #highScoreEl {
        font-size: 16px;
        color: #aaa;
        text-shadow: none;
        margin-top: 5px;
    }
    .screens {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        background: rgba(0, 0, 0, 0.85);
        padding: 40px;
        border-radius: 15px;
        border: 2px solid var(--primary);
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        pointer-events: auto;
        backdrop-filter: blur(5px);
        z-index: 9998;
        display: block;
    }
    h1 {
        margin: 0 0 15px;
        font-size: 32px;
        text-shadow: 0 0 15px var(--primary);
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    p {
        color: #ccc;
        font-size: 16px;
        line-height: 1.5;
    }
    .legend {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 20px 0;
        font-size: 14px;
    }
    .legend span {
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .box { width: 15px; height: 15px; border-radius: 3px; }
    .box.red { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
    .box.purple { background: var(--fake); box-shadow: 0 0 10px var(--fake); }
    
    button {
        position: relative;
        z-index: 9999;
        background: transparent;
        color: var(--primary);
        border: 2px solid var(--primary);
        padding: 15px 40px;
        font-size: 18px;
        border-radius: 8px;
        cursor: pointer;
        text-transform: uppercase;
        font-weight: bold;
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.2) inset;
        transition: all 0.2s;
        margin-top: 10px;
        pointer-events: auto;
    }
    button:hover {
        background: var(--primary);
        color: #000;
        box-shadow: 0 0 20px var(--primary);
    }
    .footer {
        margin-bottom: 20px;
        font-size: 13px;
        color: #888;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        text-shadow: 0 0 5px rgba(255,255,255,0.2);
    }
    #focusOverlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        mask-image: radial-gradient(circle at center, transparent 10%, black 45%);
        -webkit-mask-image: radial-gradient(circle at center, transparent 10%, black 45%);
        opacity: 0;
        transition: opacity 0.8s;
        pointer-events: none;
        z-index: 5;
    }
</style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="focusOverlay"></div>
    <div class="ui-layer">
        <div class="score-board">
            <div id="scoreEl">Score: 0</div>
            <div id="highScoreEl">Best: 0</div>
        </div>
        <div class="footer">A Gamesless Creation by Vishal Kharat</div>
    </div>
    
    <div id="startScreen" class="screens">
        <h1>Tap Escape</h1>
        <p>Tap or Click to jump.<br>Survive as long as possible!</p>
        <div class="legend">
            <span><div class="box red"></div> Deadly</span>
            <span><div class="box purple"></div> Fake</span>
        </div>
        <button id="startBtn">Start Game</button>
    </div>

    <div id="gameOverScreen" class="screens" style="display: none;">
        <h1 style="text-shadow: 0 0 15px #ff0055; border-bottom: none;">Game Over</h1>
        <p id="finalScore" style="font-size: 24px; color: #fff;">Score: 0</p>
        <button id="restartBtn">Try Again</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('scoreEl');
const highScoreEl = document.getElementById('highScoreEl');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const finalScoreEl = document.getElementById('finalScore');
const focusOverlay = document.getElementById('focusOverlay');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');

let width, height;
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let frames = 0;
let score = 0;
let highScore = localStorage.getItem('gamesless_tap_escape_highscore') || 0;
highScoreEl.innerText = `Best: ${highScore}`;
let gameSpeed = 6;
let isPlaying = false; 
let animationId;
let obstacles = [];
let isFocusModeActive = false;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    if (type === 'jump') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'crash') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }
}

const player = {
    x: window.innerWidth < 600 ? 50 : 150,
    y: height / 2,
    radius: 12,
    dy: 0,
    gravity: 0.5,
    jumpPower: -9,
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#0ff';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#0ff';
        ctx.fill();
        ctx.closePath();
        ctx.shadowBlur = 0;
    },
    update() {
        this.dy += this.gravity;
        this.y += this.dy;

        if (this.y + this.radius > height) {
            this.y = height - this.radius;
            this.dy = 0;
        }
        if (this.y - this.radius < 0) {
            this.y = this.radius;
            this.dy = 0;
        }
        this.draw();
    },
    jump() {
        this.dy = this.jumpPower;
        playSound('jump');
    }
};

class Obstacle {
    constructor() {
        this.width = 30 + Math.random() * 30;
        this.height = 60 + Math.random() * (height / 2.5);
        this.x = width;
        this.y = Math.random() > 0.5 ? height - this.height : 0;
        this.isFake = Math.random() < 0.25; 
    }

    draw() {
        ctx.beginPath();
        ctx.rect(this.x, this.y, this.width, this.height);
        ctx.fillStyle = this.isFake ? '#a020f0' : '#ff0055';
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.isFake ? '#a020f0' : '#ff0055';
        ctx.fill();
        ctx.closePath();
        ctx.shadowBlur = 0;
    }

    update() {
        this.x -= gameSpeed;
        this.draw();
    }
}

function handleObstacles() {
    let spawnRate = Math.max(40, Math.floor(100 - gameSpeed * 2));
    if (frames % spawnRate === 0) {
        obstacles.push(new Obstacle());
    }

    for (let i = 0; i < obstacles.length; i++) {
        let obs = obstacles[i];
        obs.update();

        if (!obs.isFake) {
            let testX = player.x;
            let testY = player.y;

            if (player.x < obs.x) testX = obs.x;
            else if (player.x > obs.x + obs.width) testX = obs.x + obs.width;
            
            if (player.y < obs.y) testY = obs.y;
            else if (player.y > obs.y + obs.height) testY = obs.y + obs.height;

            let distX = player.x - testX;
            let distY = player.y - testY;
            let distance = Math.sqrt((distX * distX) + (distY * distY));

            if (distance <= player.radius) {
                gameOver();
            }
        }

        if (obs.x + obs.width < 0) {
            obstacles.splice(i, 1);
            i--;
        }
    }
}

function triggerFocusMode() {
    if (!isFocusModeActive && Math.random() < 0.002) { 
        isFocusModeActive = true;
        focusOverlay.style.opacity = '1';
        
        setTimeout(() => {
            focusOverlay.style.opacity = '0';
            isFocusModeActive = false;
        }, 3000 + Math.random() * 2000);
    }
}

function gameLoop() {
    if (!isPlaying) return;
    
    ctx.clearRect(0, 0, width, height);
    
    player.update();
    handleObstacles();
    triggerFocusMode();

    frames++;
    if (frames % 10 === 0) {
        score++;
        scoreEl.innerText = `Score: ${score}`;
        
        if (score % 150 === 0) {
            gameSpeed += 0.5;
        }
    }

    animationId = requestAnimationFrame(gameLoop);
}

function startGame(e) {
    if (e && e.cancelable) e.preventDefault();
    console.log("START CLICKED");
    
    if (isPlaying) return; 

    if (audioCtx.state === 'suspended') audioCtx.resume();

    startScreen.style.display = "none";
    gameOverScreen.style.display = "none";

    isPlaying = true;
    score = 0;
    obstacles = [];
    frames = 0;
    gameSpeed = 6;
    
    player.y = height / 2;
    player.dy = 0;
    
    scoreEl.innerText = `Score: ${score}`;
    focusOverlay.style.opacity = '0';
    isFocusModeActive = false;
    
    cancelAnimationFrame(animationId);
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    isPlaying = false;
    cancelAnimationFrame(animationId);
    playSound('crash');
    
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('gamesless_tap_escape_highscore', highScore);
        highScoreEl.innerText = `Best: ${highScore}`;
    }
    
    finalScoreEl.innerText = `Score: ${score}`;
    gameOverScreen.style.display = "block";
}

startBtn.addEventListener("click", startGame);
startBtn.addEventListener("touchstart", startGame, { passive: false });
startBtn.addEventListener("pointerdown", startGame);

restartBtn.addEventListener("click", startGame);
restartBtn.addEventListener("touchstart", startGame, { passive: false });
restartBtn.addEventListener("pointerdown", startGame);

window.addEventListener('mousedown', (e) => {
    if (e.target.tagName !== 'BUTTON' && isPlaying) player.jump();
});

window.addEventListener('touchstart', (e) => {
    if (e.target.tagName !== 'BUTTON' && isPlaying) {
        if (e.cancelable) e.preventDefault();
        player.jump();
    }
}, { passive: false });

window.addEventListener('keydown', (e) => {
    if ((e.code === 'Space' || e.code === 'ArrowUp') && isPlaying) {
        e.preventDefault();
        player.jump();
    }
});
</script>
</body>
</html>
