<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Escape FIXED</title>

<style>
body,html{
margin:0;
padding:0;
overflow:hidden;
background:#0b0b1a;
}

canvas{
position:absolute;
top:0;
left:0;
}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let isPlaying = true;
let gravity = 0.5;
let gameSpeed = 6;
let score = 0;

/* PLAYER */
const player = {
x:100,
y:200,
r:10,
dy:0,
jump(){
this.dy = -10;
},
update(){
this.dy += gravity;
this.y += this.dy;

if(this.y > canvas.height - this.r){
this.y = canvas.height - this.r;
this.dy = 0;
}
if(this.y < this.r){
this.y = this.r;
this.dy = 0;
}
}
};

/* OBSTACLES */
let obstacles = [];

function spawnObstacle(){
if(Math.random()<0.02){
obstacles.push({
x:canvas.width,
w:30,
h:50+Math.random()*150,
y:Math.random()>0.5 ? canvas.height-100 : 0
});
}
}

function updateObstacles(){
for(let i=0;i<obstacles.length;i++){
let o = obstacles[i];
o.x -= gameSpeed;

/* COLLISION (FIXED) */
let dx = player.x - Math.max(o.x, Math.min(player.x, o.x+o.w));
let dy = player.y - Math.max(o.y, Math.min(player.y, o.y+o.h));

if((dx*dx + dy*dy) < player.r*player.r){
gameOver();
}

if(o.x < -50){
obstacles.splice(i,1);
i--;
}
}
}

/* BACKGROUND */
let time=0;

function drawBackground(){
let phase = Math.floor(time/600)%3;

if(phase==0) ctx.fillStyle="#87CEEB";
if(phase==1) ctx.fillStyle="#FF8C00";
if(phase==2) ctx.fillStyle="#001848";

ctx.fillRect(0,0,canvas.width,canvas.height);

/* Sun/Moon */
ctx.beginPath();
ctx.arc(canvas.width-80,80,30,0,Math.PI*2);
ctx.fillStyle = phase==2 ? "white":"yellow";
ctx.fill();

/* Stars */
if(phase==2){
for(let i=0;i<40;i++){
ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,2,2);
}
}
}

/* TREES */
let trees=[];
function spawnTrees(){
if(Math.random()<0.05){
trees.push({x:canvas.width,h:50+Math.random()*100});
}
}
function drawTrees(){
trees.forEach((t,i)=>{
t.x-=2;
ctx.fillStyle="green";
ctx.fillRect(t.x,canvas.height-t.h,20,t.h);
if(t.x<-20) trees.splice(i,1);
});
}

/* GAME OVER */
function gameOver(){
isPlaying=false;
alert("Game Over! Score: "+score);
location.reload();
}

/* LOOP */
function loop(){
if(!isPlaying) return;

drawBackground();

spawnTrees();
drawTrees();

spawnObstacle();
updateObstacles();

/* DRAW OBSTACLES */
ctx.fillStyle="red";
obstacles.forEach(o=>{
ctx.fillRect(o.x,o.y,o.w,o.h);
});

player.update();

/* DRAW PLAYER */
ctx.beginPath();
ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
ctx.fillStyle="cyan";
ctx.fill();

/* SCORE */
score++;
time++;

requestAnimationFrame(loop);
}

/* CONTROLS */
window.addEventListener("click",()=>{
player.jump();
});

loop();
</script>

</body>
</html>
