<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tap Escape: Brain Reflex Challenge</title>
<style>
    :root {
        --primary: #0ff;
        --danger: #ff0055;
        --fake: #a020f0;
        --bg: #0b0b1a;
    }
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: #fff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
        touch-action: none;
    }
    #gameCanvas {
        display: block;
        width: 100%;
        height: 100%;
    }
    .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
    }
    .score-board {
        margin-top: 30px;
        font-size: 28px;
        font-weight: bold;
        text-align: center;
        text-shadow: 0 0 10px var(--primary);
    }
    #highScoreEl {
        font-size: 16px;
        color: #aaa;
        text-shadow: none;
        margin-top: 5px;
    }
    .screens {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        background: rgba(0, 0, 0, 0.85);
        padding: 40px;
        border-radius: 15px;
        border: 2px solid var(--primary);
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        pointer-events: auto !important;
        transition: opacity 0.3s;
        backdrop-filter: blur(5px);
        z-index: 100;
        display: block;
    }
    .hidden {
        display: none !important;
        opacity: 0;
        pointer-events: none;
    }
    h1 {
        margin: 0 0 15px;
        font-size: 32px;
        text-shadow: 0 0 15px var(--primary);
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    p {
        color: #ccc;
        font-size: 16px;
        line-height: 1.5;
    }
    .legend {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 20px 0;
        font-size: 14px;
    }
    .legend span {
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .box { width: 15px; height: 15px; border-radius: 3px; }
    .box.red { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
    .box.purple { background: var(--fake); box-shadow: 0 0 10px var(--fake); }
    
    button {
        position: relative;
        z-index: 101;
        background: transparent;
        color: var(--primary);
        border: 2px solid var(--primary);
        padding: 15px 40px;
        font-size: 18px;
        border-radius: 8px;
        cursor: pointer;
        text-transform: uppercase;
        font-weight: bold;
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.2) inset;
        transition: all 0.2s;
        margin-top: 10px;
        pointer-events: auto;
    }
    button:hover {
        background: var(--primary);
        color: #000;
        box-shadow: 0 0 20px var(--primary);
    }
    .footer {
        margin-bottom: 20px;
        font-size: 13px;
        color: #888;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        text-shadow: 0 0 5px rgba(255,255,255,0.2);
    }
    #focusOverlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        mask-image: radial-gradient(circle at center, transparent 10%, black 45%);
        -webkit-mask-image: radial-gradient(circle at center, transparent 10%, black 45%);
        opacity: 0;
        transition: opacity 0.8s;
        pointer-events: none;
        z-index: 5;
    }
</style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="focusOverlay"></div>
    <div class="ui-layer">
        <div class="score-board">
            <div id="scoreEl">Score: 0</div>
            <div id="highScoreEl">Best: 0</div>
        </div>
        <div class="footer">A Gamesless Creation by Vishal Kharat</div>
    </div>
    
    <div id="startScreen" class="screens">
        <h1>Tap Escape</h1>
        <p>Tap or Click to jump.<br>Survive as long as possible!</p>
        <div class="legend">
            <span><div class="box red"></div> Deadly</span>
            <span><div class="box purple"></div> Fake</span>
        </div>
        <button id="startBtn">Start Game</button>
    </div>

    <div id="gameOverScreen" class="screens hidden">
        <h1 style="text-shadow: 0 0 15px #ff0055; border-bottom: none;">Game Over</h1>
        <p id="finalScore" style="font-size: 24px; color: #fff;">Score: 0</p>
        <button id="restartBtn">Try Again</button>
    </div>
</body>
</html>
